<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E FLOW - Smart Water Management Dashboard</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --accent-blue: #38bdf8;
            --accent-green: #22c55e;
            --accent-red: #ef4444;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            padding: 1rem 2rem;
            background-color: var(--card-bg);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #334155;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--accent-blue);
        }

        nav a {
            color: var(--text-muted);
            text-decoration: none;
            margin-left: 1.5rem;
            font-size: 0.9rem;
        }

        .main-content {
            display: grid;
            grid-template-columns: 250px 1fr 300px;
            gap: 1.5rem;
            padding: 1.5rem;
            flex-grow: 1;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        h2 {
            font-size: 1rem;
            color: var(--text-muted);
            margin-top: 0;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        /* Charts Section */
        .charts-container {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .chart-placeholder {
            height: 200px;
            background: linear-gradient(180deg, rgba(56, 189, 248, 0.1) 0%, rgba(56, 189, 248, 0) 100%);
            border: 1px dashed #334155;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
        }

        /* Controls Section */
        .control-buttons {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .circle-btn {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 4px solid;
            background: transparent;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 0.8rem;
            transition: all 0.3s;
        }

        .btn-stop { border-color: var(--accent-red); color: var(--accent-red); }
        .btn-stop:hover { background: var(--accent-red); color: white; }
        
        .btn-pump { border-color: var(--accent-blue); color: var(--accent-blue); }
        .btn-pump:hover { background: var(--accent-blue); color: white; }

        .max-volume {
            margin-top: 2rem;
            text-align: center;
        }

        .volume-display {
            font-size: 2rem;
            font-weight: bold;
            color: var(--accent-blue);
            margin: 0.5rem 0;
        }

        .status-list {
            list-style: none;
            padding: 0;
            margin-top: 2rem;
        }

        .status-item {
            display: flex;
            align-items: center;
            margin-bottom: 0.75rem;
            font-size: 0.9rem;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 10px;
        }

        .dot-green { background-color: var(--accent-green); }
        .dot-blue { background-color: var(--accent-blue); }
        .dot-none { background-color: var(--text-muted); }

        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">E FLOW</div>
        <div style="color: var(--text-muted); font-size: 0.9rem;">- Smart Water Management</div>
        <nav>
            <a href="#">Home</a>
            <a href="#">Project</a>
            <a href="#">About</a>
            <a href="./login.html">Login</a>
        </nav>
    </header>

    <div class="main-content">
        <div class="charts-container">
            <div class="card">
                <h2>Débit Initial (L/min)</h2>
                <div class="chart-placeholder">Graphique du débit en temps réel</div>
            </div>
            <div class="card">
                <h2>Nombre de cycles moteur</h2>
                <div class="chart-placeholder">Graphique des cycles moteur</div>
            </div>
        </div>

        <!-- Right Controls -->
        <div class="card">
            <h2>Contrôles</h2>
            <div class="control-buttons">
                <button class="circle-btn btn-stop">ARRÊT<br>Urgence</button>
                <button class="circle-btn btn-pump">ALLUMER<br>LA POMPE</button>
            </div>

            <div class="max-volume">
                <h2>SET MAX VOLUME</h2>
                <div class="volume-display">50.0 L</div>
            </div>

            <div class="status-list">
                <h2>SYSTEM STATUS</h2>
                <div class="status-item">
                    <span class="dot dot-green"></span> Pump: ON
                </div>
                <div class="status-item">
                    <span class="dot dot-blue"></span> Flow: 5.7 L/min
                </div>
                <div class="status-item">
                    <span class="dot dot-none"></span> Leak: NONE
                </div>
            </div>
        </div>
    </div>
</body>
</html>
